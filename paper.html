<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jiu Chen — ML Systems Researcher</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      /* light — warm paper */
      --bg:        oklch(0.985 0.006 80);
      --bg-soft:   oklch(0.965 0.008 80);
      --ink:       oklch(0.22 0.012 60);
      --ink-soft:  oklch(0.42 0.012 60);
      --ink-mute:  oklch(0.58 0.010 60);
      --rule:      oklch(0.90 0.008 80);
      --rule-soft: oklch(0.94 0.006 80);
      --accent:    oklch(0.58 0.14 38);  /* terracotta */
      --accent-bg: oklch(0.94 0.04 50);

      --serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
      --sans:  "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    html[data-theme="dark"] {
      --bg:        oklch(0.17 0.008 60);
      --bg-soft:   oklch(0.21 0.010 60);
      --ink:       oklch(0.93 0.008 80);
      --ink-soft:  oklch(0.72 0.010 70);
      --ink-mute:  oklch(0.55 0.010 70);
      --rule:      oklch(0.28 0.012 60);
      --rule-soft: oklch(0.24 0.010 60);
      --accent:    oklch(0.72 0.14 45);
      --accent-bg: oklch(0.28 0.06 40);
    }

    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: "ss01", "ss02";
    }

    a { color: var(--ink); text-decoration: none; }
    a:hover { color: var(--accent); }

    ::selection { background: var(--accent-bg); color: var(--ink); }

    /* ---------- layout ---------- */
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 48px 120px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 64px;
    }

    @media (max-width: 880px) {
      .page {
        grid-template-columns: 1fr;
        padding: 32px 24px 80px;
        gap: 32px;
      }
    }

    /* ---------- sticky rail ---------- */
    .rail {
      position: sticky;
      top: 56px;
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 28px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    @media (max-width: 880px) {
      .rail { position: static; }
    }

    .rail-mark {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 24px;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
    }
    .rail-mark .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      vertical-align: middle;
      margin-left: 6px;
      transform: translateY(-2px);
    }

    .rail-block-label {
      color: var(--ink-mute);
      text-transform: uppercase;
      font-size: 10.5px;
      margin-bottom: 10px;
      letter-spacing: 0.12em;
    }

    .rail-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .rail-nav a {
      color: var(--ink-soft);
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 2px 0;
    }
    .rail-nav a .num { color: var(--ink-mute); width: 18px; flex: none; }
    .rail-nav a:hover { color: var(--accent); }
    .rail-nav a.active { color: var(--ink); }
    .rail-nav a.active .num { color: var(--accent); }

    .rail-links { display: flex; flex-direction: column; gap: 4px; }
    .rail-links a {
      color: var(--ink-soft);
      display: inline-flex;
      gap: 6px;
      align-items: baseline;
    }
    .rail-links a::after {
      content: "↗";
      color: var(--ink-mute);
      font-size: 11px;
    }
    .rail-links a:hover { color: var(--accent); }

    /* ---------- content ---------- */
    .content { min-width: 0; }

    /* hero */
    .hero {
      padding-bottom: 56px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 56px;
    }

    .hero-meta {
      font-family: var(--mono);
      font-size: 11.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 22px;
    }
    .hero-meta .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   color-mix(in oklch, var(--accent) 60%, transparent); }
      70%  { box-shadow: 0 0 0 10px color-mix(in oklch, var(--accent) 0%, transparent); }
      100% { box-shadow: 0 0 0 0   color-mix(in oklch, var(--accent) 0%, transparent); }
    }

    .hero h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(48px, 7vw, 84px);
      line-height: 0.98;
      letter-spacing: -0.025em;
      margin: 0 0 18px;
      color: var(--ink);
    }
    .hero h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .hero-lede {
      font-family: var(--serif);
      font-size: 20px;
      line-height: 1.5;
      font-weight: 400;
      color: var(--ink-soft);
      max-width: 56ch;
      margin: 0 0 32px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-mute);
    }
    .hero-tags span::before { content: "// "; opacity: 0.45; }

    /* section */
    section.s {
      padding-top: 8px;
      padding-bottom: 64px;
      scroll-margin-top: 32px;
    }
    section.s + section.s { border-top: 1px solid var(--rule); padding-top: 56px; }

    .s-head {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 16px;
      align-items: baseline;
      margin-bottom: 28px;
    }
    @media (max-width: 600px) {
      .s-head { grid-template-columns: 56px 1fr; }
    }
    .s-num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
    }
    .s-title {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 28px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0;
    }

    .s-body {
      padding-left: 96px;
    }
    @media (max-width: 600px) { .s-body { padding-left: 72px; } }
    @media (max-width: 480px) { .s-body { padding-left: 0; } }

    .s-body p {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.65;
      color: var(--ink);
      margin: 0 0 16px;
      max-width: 62ch;
      text-wrap: pretty;
    }
    .s-body p.muted { color: var(--ink-soft); }

    /* research grid */
    .research-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      margin-top: 8px;
    }
    @media (max-width: 600px) { .research-grid { grid-template-columns: 1fr; } }
    .research-cell {
      background: var(--bg);
      padding: 22px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 150px;
    }
    .research-cell .tag {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .research-cell h3 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 19px;
      margin: 0;
      line-height: 1.25;
      color: var(--ink);
    }
    .research-cell p {
      font-family: var(--sans);
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin: 0;
    }

    /* publications */
    .pub {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 16px;
      padding: 20px 0;
      border-top: 1px solid var(--rule);
    }
    .pub:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 600px) {
      .pub { grid-template-columns: 1fr; gap: 4px; }
    }
    .pub-meta {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    .pub-meta .y { color: var(--ink); display: block; font-size: 13px; }
    .pub-body h3 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 19px;
      line-height: 1.35;
      margin: 0 0 6px;
      color: var(--ink);
      max-width: 56ch;
    }
    .pub-body .authors {
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--ink-soft);
      margin: 0 0 4px;
    }
    .pub-body .authors strong { color: var(--ink); font-weight: 600; }
    .pub-body .venue {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      margin: 0 0 10px;
    }
    .pub-links {
      display: flex;
      gap: 14px;
      font-family: var(--mono);
      font-size: 11.5px;
    }
    .pub-links a {
      color: var(--ink-soft);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
    }
    .pub-links a:hover { color: var(--accent); border-color: var(--accent); }

    /* projects */
    .proj {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid var(--rule);
    }
    .proj:last-child { border-bottom: 1px solid var(--rule); }
    .proj-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    .proj-head h3 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 19px;
      margin: 0;
      color: var(--ink);
    }
    .proj-head .stack {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
    }
    .proj-head .stack span { color: var(--accent); }
    .proj p {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--ink-soft);
      margin: 0;
      max-width: 64ch;
    }
    .proj-links {
      display: flex;
      gap: 14px;
      font-family: var(--mono);
      font-size: 11.5px;
    }
    .proj-links a {
      color: var(--ink-soft);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
    }
    .proj-links a:hover { color: var(--accent); border-color: var(--accent); }

    /* experience */
    .exp {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 16px;
      padding: 18px 0;
      border-top: 1px solid var(--rule);
    }
    .exp:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 600px) {
      .exp { grid-template-columns: 1fr; gap: 4px; }
    }
    .exp-when {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    .exp-body h3 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 18px;
      margin: 0 0 2px;
      color: var(--ink);
    }
    .exp-body .where {
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--ink-soft);
      margin: 0 0 8px;
    }
    .exp-body p {
      font-family: var(--sans);
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--ink-soft);
      margin: 0;
      max-width: 60ch;
    }

    /* Now panel */
    .now-card {
      background: var(--bg-soft);
      border: 1px solid var(--rule);
      padding: 24px 26px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .now-card .row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: baseline;
      font-size: 14px;
      line-height: 1.55;
    }
    @media (max-width: 540px) {
      .now-card .row { grid-template-columns: 1fr; gap: 2px; }
    }
    .now-card .when {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
    }
    .now-card .what {
      font-family: var(--serif);
      font-size: 16px;
      color: var(--ink);
    }
    .now-card .what .mute { color: var(--ink-soft); }
    .now-card hr {
      border: 0;
      border-top: 1px dashed var(--rule);
      margin: 0;
    }
    .now-stamp {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* contact */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
    }
    @media (max-width: 540px) { .contact-grid { grid-template-columns: 1fr; } }
    .contact-cell {
      background: var(--bg);
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.15s;
    }
    .contact-cell:hover { background: var(--bg-soft); }
    .contact-cell .label {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--ink-mute);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .contact-cell .value {
      font-family: var(--serif);
      font-size: 17px;
      color: var(--ink);
    }
    .contact-cell:hover .value { color: var(--accent); }

    /* footer note */
    .colophon {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* hero animation container */
    .hero-anim {
      margin-top: 28px;
      border: 1px solid var(--rule);
      background: var(--bg-soft);
      padding: 18px 20px 14px;
      position: relative;
      overflow: hidden;
    }
    .hero-anim-head {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hero-anim-head .live {
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .hero-anim-head .live::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .toolbar-spacer { height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero-diagram.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>
</body>
</html>
