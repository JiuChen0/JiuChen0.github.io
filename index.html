<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jiu Chen — ML Systems Researcher</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      /* clean cool neutrals */
      --bg:         #ffffff;
      --bg-soft:    #f5f5f7;
      --bg-sunk:    #fbfbfd;
      --ink:        #1d1d1f;
      --ink-soft:   #424245;
      --ink-mute:   #86868b;
      --ink-faint:  #b6b6bb;
      --rule:       rgba(0,0,0,0.08);
      --rule-soft:  rgba(0,0,0,0.05);
      --accent:     #0066cc;
      --accent-bg:  rgba(0,102,204,0.08);

      --sans:  -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
      --mono:  ui-monospace, "SF Mono", "Menlo", "Monaco", "Cascadia Mono", monospace;

      --radius-sm: 8px;
      --radius:    14px;
      --radius-lg: 20px;
    }

    html[data-theme="dark"] {
      --bg:         #000000;
      --bg-soft:    #1c1c1e;
      --bg-sunk:    #0a0a0c;
      --ink:        #f5f5f7;
      --ink-soft:   #c7c7cc;
      --ink-mute:   #86868b;
      --ink-faint:  #48484a;
      --rule:       rgba(255,255,255,0.10);
      --rule-soft:  rgba(255,255,255,0.06);
      --accent:     #2997ff;
      --accent-bg:  rgba(41,151,255,0.14);
    }

    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "cv11", "ss01";
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }

    ::selection { background: var(--accent-bg); color: var(--ink); }

    strong { font-weight: 600; }

    /* ---------- layout ---------- */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 56px 160px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 96px;
    }

    @media (max-width: 920px) {
      .page {
        grid-template-columns: 1fr;
        padding: 40px 24px 96px;
        gap: 48px;
      }
    }

    /* ---------- sticky rail ---------- */
    .rail {
      position: sticky;
      top: 56px;
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    @media (max-width: 920px) { .rail { position: static; } }

    .rail-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .rail-mark .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-soft);
      box-shadow: 0 0 0 1px var(--rule), 0 1px 2px rgba(0,0,0,0.04);
      display: block;
    }

    .rail-block-label {
      color: var(--ink-mute);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .rail-nav { display: flex; flex-direction: column; gap: 2px; }
    .rail-nav a {
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 400;
      padding: 6px 0;
      transition: color 0.15s ease;
    }
    .rail-nav a:hover { color: var(--ink); text-decoration: none; }
    .rail-nav a.active {
      color: var(--accent);
      font-weight: 500;
    }

    .rail-links { display: flex; flex-direction: column; gap: 6px; }
    .rail-links a {
      color: var(--ink-soft);
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .rail-links a::after {
      content: "↗";
      color: var(--ink-faint);
      font-size: 11px;
    }
    .rail-links a:hover { color: var(--accent); text-decoration: none; }

    .rail-stamp {
      font-size: 12px;
      color: var(--ink-mute);
      line-height: 1.5;
    }

    /* ---------- content ---------- */
    .content { min-width: 0; }

    /* hero */
    .hero { padding-bottom: 80px; }

    .hero-portrait {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
      margin-bottom: 22px;
      background: var(--bg-soft);
      box-shadow:
        0 0 0 1px var(--rule),
        0 1px 2px rgba(0,0,0,0.04),
        0 16px 40px -16px rgba(0,0,0,0.18);
    }
    html[data-theme="dark"] .hero-portrait {
      box-shadow:
        0 0 0 1px var(--rule),
        0 16px 40px -16px rgba(0,0,0,0.6);
    }

    .hero-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px 6px 10px;
      background: var(--accent-bg);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
    }
    .hero-meta .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   color-mix(in srgb, var(--accent) 50%, transparent); }
      70%  { box-shadow: 0 0 0 10px color-mix(in srgb, var(--accent) 0%, transparent); }
      100% { box-shadow: 0 0 0 0   color-mix(in srgb, var(--accent) 0%, transparent); }
    }

    .hero h1 {
      font-family: var(--sans);
      font-weight: 600;
      font-size: clamp(46px, 6.4vw, 88px);
      line-height: 1.02;
      letter-spacing: -0.045em;
      margin: 0 0 24px;
      color: var(--ink);
      text-wrap: balance;
    }
    .hero h1 .grad {
      background: linear-gradient(120deg, #2997ff 0%, #0066cc 50%, #5e5ce6 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 600;
    }

    .hero-lede {
      font-size: 21px;
      line-height: 1.45;
      font-weight: 400;
      color: var(--ink-soft);
      max-width: 58ch;
      margin: 0 0 36px;
      letter-spacing: -0.011em;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero-tags span {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--bg-soft);
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: -0.005em;
    }

    /* section */
    section.s {
      padding-top: 80px;
      padding-bottom: 24px;
      scroll-margin-top: 32px;
    }

    .s-eyebrow {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .s-title {
      font-weight: 600;
      font-size: clamp(32px, 3.4vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin: 0 0 36px;
      text-wrap: balance;
    }

    .s-body { max-width: 100%; }

    .s-body p {
      font-size: 17px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin: 0 0 18px;
      max-width: 62ch;
      letter-spacing: -0.005em;
    }
    .s-body p.lead {
      font-size: 21px;
      line-height: 1.45;
      color: var(--ink);
      letter-spacing: -0.011em;
      margin-bottom: 28px;
      max-width: 58ch;
    }
    .s-body strong { color: var(--ink); font-weight: 600; }

    /* research grid — soft-fill cards */
    .research-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
      margin-top: 24px;
    }
    @media (max-width: 600px) { .research-grid { grid-template-columns: 1fr; } }

    .research-cell {
      background: var(--bg-soft);
      border-radius: var(--radius);
      padding: 28px 28px 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .research-cell:hover {
      background: color-mix(in srgb, var(--bg-soft) 80%, var(--ink) 4%);
    }
    .research-cell .tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .research-cell h3 {
      font-weight: 600;
      font-size: 21px;
      letter-spacing: -0.018em;
      margin: 0;
      line-height: 1.2;
      color: var(--ink);
    }
    .research-cell p {
      font-size: 14.5px;
      line-height: 1.5;
      color: var(--ink-soft);
      margin: 0;
      letter-spacing: -0.003em;
    }

    /* publications */
    .pub {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 24px;
      padding: 28px 0;
      border-top: 1px solid var(--rule);
    }
    .pub:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 600px) { .pub { grid-template-columns: 1fr; gap: 8px; } }
    .pub-meta {
      font-size: 13px;
      color: var(--ink-mute);
      line-height: 1.55;
    }
    .pub-meta .y {
      color: var(--ink);
      display: block;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .pub-body h3 {
      font-weight: 600;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: -0.018em;
      margin: 0 0 10px;
      color: var(--ink);
      max-width: 58ch;
    }
    .pub-body .authors {
      font-size: 14.5px;
      color: var(--ink-soft);
      margin: 0 0 6px;
      letter-spacing: -0.005em;
    }
    .pub-body .authors strong { color: var(--ink); font-weight: 600; }
    .pub-body .venue {
      font-size: 13px;
      color: var(--ink-mute);
      margin: 0 0 14px;
      letter-spacing: -0.003em;
    }
    .pub-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: var(--bg-soft);
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: -0.005em;
      transition: background 0.15s ease;
    }
    .pill-link:hover {
      background: color-mix(in srgb, var(--bg-soft) 70%, var(--accent) 12%);
      text-decoration: none;
    }

    /* projects */
    .proj {
      padding: 32px 0;
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 32px;
      align-items: start;
    }
    .proj:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 720px) {
      .proj { grid-template-columns: 1fr; gap: 16px; }
    }
    .proj-text {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .proj-anim {
      background: var(--bg-soft);
      border-radius: var(--radius);
      padding: 0;
      height: 160px;
      overflow: hidden;
      display: block;
    }
    .proj-svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .proj-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }
    .proj-head h3 {
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--ink);
    }
    .proj-stack {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .proj-stack span {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--bg-soft);
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: -0.003em;
    }
    .proj p {
      font-size: 15.5px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin: 0;
      max-width: 66ch;
      letter-spacing: -0.005em;
    }
    .proj-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    /* experience / education */
    .exp {
      display: grid;
      grid-template-columns: 140px 1fr 112px;
      gap: 24px;
      padding: 26px 0;
      border-top: 1px solid var(--rule);
      align-items: start;
    }
    .exp:last-child { border-bottom: 1px solid var(--rule); }
    .exp.no-anim { grid-template-columns: 140px 1fr; }
    @media (max-width: 720px) {
      .exp,
      .exp.no-anim { grid-template-columns: 1fr; gap: 6px; }
      .exp .exp-anim-slot { order: 99; margin-top: 8px; }
    }
    .exp-anim-slot {
      background: var(--bg-soft);
      border-radius: 10px;
      height: 68px;
      width: 100%;
      max-width: 112px;
      overflow: hidden;
      display: block;
      align-self: start;
    }

    /* education row — logo as faded background watermark on the right */
    .edu {
      position: relative;
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 24px;
      padding: 26px 0;
      border-top: 1px solid var(--rule);
      align-items: start;
      overflow: hidden;
    }
    .edu:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 600px) {
      .edu { grid-template-columns: 1fr; gap: 4px; }
    }
    .edu .exp-body { position: relative; z-index: 1; max-width: 64ch; }
    .edu-watermark {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      height: 80px;
      width: 80px;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 0;
      opacity: 0.16;
      transition: opacity 0.2s ease;
    }
    html[data-theme="dark"] .edu-watermark { opacity: 0.22; }
    .edu:hover .edu-watermark { opacity: 0.28; }
    html[data-theme="dark"] .edu:hover .edu-watermark { opacity: 0.36; }
    .edu-watermark img,
    .edu-watermark svg {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .edu-watermark .glyph {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 80px;
      line-height: 0.85;
      letter-spacing: -0.05em;
      color: var(--ink);
    }
    .edu-watermark .glyph-cjk {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 78px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--ink);
    }
    @media (max-width: 600px) {
      .edu-watermark { right: 4px; height: 60px; width: 60px; }
      .edu-watermark .glyph { font-size: 60px; }
      .edu-watermark .glyph-cjk { font-size: 58px; }
    }
    .exp-svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .exp-when {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-mute);
      line-height: 1.5;
      letter-spacing: -0.003em;
    }
    .exp-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .exp-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .exp-body h3 {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.017em;
      margin: 0;
      color: var(--ink);
    }
    .exp-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--bg-soft);
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: -0.003em;
      text-transform: capitalize;
    }
    .exp-body .where {
      font-size: 14.5px;
      color: var(--ink-soft);
      margin: 2px 0 8px;
      letter-spacing: -0.005em;
    }
    .exp-body p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin: 0;
      max-width: 62ch;
      letter-spacing: -0.003em;
    }

    /* awards */
    .award-list { list-style: none; margin: 0; padding: 0; }
    .award {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 24px;
      padding: 20px 0;
      border-top: 1px solid var(--rule);
      align-items: baseline;
    }
    .award:last-child { border-bottom: 1px solid var(--rule); }
    @media (max-width: 600px) {
      .award { grid-template-columns: 1fr; gap: 4px; }
    }
    .award .y {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-mute);
      letter-spacing: -0.003em;
    }
    .award .t {
      font-size: 16px;
      color: var(--ink);
      line-height: 1.5;
      letter-spacing: -0.008em;
      max-width: 64ch;
    }

    /* contact */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      margin-top: 24px;
    }
    @media (max-width: 540px) { .contact-grid { grid-template-columns: 1fr; } }

    .contact-cell {
      background: var(--bg-soft);
      border-radius: var(--radius);
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .contact-cell:hover {
      background: color-mix(in srgb, var(--bg-soft) 75%, var(--accent) 8%);
      text-decoration: none;
    }
    .contact-cell .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-mute);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .contact-cell .value {
      font-size: 18px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.014em;
    }
    .contact-cell .value .arrow { color: var(--ink-mute); margin-left: 4px; }
    .contact-cell:hover .value { color: var(--accent); }
    .contact-cell:hover .value .arrow { color: var(--accent); }

    /* footer note */
    .colophon {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-size: 12.5px;
      color: var(--ink-mute);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      letter-spacing: -0.003em;
    }
    .colophon a { color: var(--ink-soft); }
    .colophon a:hover { color: var(--accent); }

    /* hero animation container */
    .hero-anim {
      margin-top: 40px;
      border-radius: var(--radius-lg);
      background: var(--bg-soft);
      padding: 24px 28px 20px;
      position: relative;
      overflow: hidden;
    }
    .hero-anim-head {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink-mute);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .hero-anim-head .live {
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .hero-anim-head .live::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero-diagram.jsx"></script>
  <script type="text/babel" src="project-animations.jsx"></script>
  <script type="text/babel" src="experience-animations.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>
</body>
</html>
